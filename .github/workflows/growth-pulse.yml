name: Growth Pulse

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  growth-pulse:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install SDK from npm (10x)
        working-directory: ./growth-bot
        run: |
          for i in {1..10}; do
            echo "Install pulse $i/10"
            npm install @phessophissy/btc-prediction-market-sdk@1.1.2 --prefer-online --no-package-lock
          done

      - name: Run growth bot smoke check
        working-directory: ./growth-bot
        run: npm run start
